<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대학 성독 스터디 - 聲讀 Master</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; justify-content: center; padding: 20px; }
  #status { font-size: 15px; margin-bottom: 15px; color: #f1c40f; display: flex; flex-wrap: wrap; gap: 15px; font-weight: bold; justify-content: center; }
  .difficulty-tag { background: #e67e22; color: white; padding: 2px 10px; border-radius: 10px; font-size: 13px; }
  #display-box { width: 95%; max-width: 750px; background: #fffdf5; color: #333; padding: 50px 35px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 6px double #d4af37; margin-bottom: 20px; transition: 0.3s; position: relative; overflow: hidden; }
  #display-box.correct { border-color: #2ecc71; background: #f0fff4; }
  #display-box.wrong { border-color: #e74c3c; background: #fff5f5; }
  .hanja { font-size: clamp(20px, 5vw, 34px); margin: 0; font-weight: bold; line-height: 1.6; word-break: keep-all; font-family: 'Gungsuh', serif; }
  .chapter-tag { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: #d4af37; color: white; padding: 4px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
  #timer-wrap { width: 95%; max-width: 750px; background: #34495e; border-radius: 10px; height: 12px; margin-bottom: 20px; overflow: hidden; }
  #timer-bar { height: 100%; width: 100%; background: #2ecc71; transition: width 1s linear; }
  #feedback-box { width: 95%; max-width: 750px; min-height: 70px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 10px 25px; text-align: center; line-height: 1.4; }
  #feedback-box.correct { background: #27ae60; color: white; }
  #feedback-box.wrong { background: #c0392b; color: white; }
  #mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: #e74c3c; color: white; font-size: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.3); outline: none; }
  #mic-btn.active { background: #2ecc71; box-shadow: 0 0 30px #2ecc71; transform: scale(1.1); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
  #mic-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div id="status">
  <span>장(章): <span id="ch-name">-</span></span>
  <span>단계: <span id="lvl">1</span> / <span id="total">-</span></span>
  <span id="diff-display" class="difficulty-tag">난이도: 입풀기</span>
</div>

<div id="game-area" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
  <div id="timer-wrap"><div id="timer-bar"></div></div>
  <div id="display-box">
    <div class="chapter-tag" id="tag-text">大學 經一장</div>
    <p class="hanja" id="target-hanja"></p>
  </div>
  <div id="feedback-box">소리 내어 읽으실 준비가 되셨나요?</div>
  <button id="mic-btn">🎙️</button>
</div>

<div id="result-screen" style="display:none; text-align:center;">
  <h2 style="color:#f1c40f; font-size:40px;">🎊 대학 전장 聲讀 완독 성공! 🎊</h2>
  <div id="stat-report" style="font-size:20px; margin-bottom:20px; line-height:1.6;"></div>
  <button onclick="location.reload()" style="padding:15px 40px; border-radius:30px; border:none; background:#d4af37; font-weight:bold; cursor:pointer;">다시 정진하기</button>
</div>

<script>
const quizData = [
  { c: "經 1장", h: "大學之道 在明明德 在親民 在止於至善", a: "대학지도 재명명덕 재친민 재지어지선" },
  { c: "經 1장", h: "知止而后 有定 定而后 能靜 靜而后 能安", a: "지지이후 유정 정이후 능정 정이후 능안" },
  { c: "經 1장", h: "安而后 能慮 慮而后 能得", a: "안이후 능려 려이후 능득" },
  { c: "經 1장", h: "物有本末 事有終始 知所先後 則近道矣", a: "물유본말 사유종시 지소선후 즉근도" },
  { c: "經 1장", h: "古之欲明明德於天下者 先治其國", a: "고지욕명명덕어천하자 선치기국" },
  { c: "經 1장", h: "欲治其國者 先齊其家 欲齊其家者 先修其身", a: "욕치기국자 선제기가 욕제기가자 선수기신" },
  { c: "經 1장", h: "欲修其身자 先正其心 欲正其心者 先誠其意", a: "욕수기신자 선정기심 욕정기심자 선성기의" },
  { c: "經 1장", h: "欲誠其意者 先致其知 致知 在格물", a: "욕성기의자 선치기지 치지 재격물" },
  { c: "經 1장", h: "物格而后 知至 知至而后 意誠 意誠而后 心正", a: "물격이후 지지 지지이후 의성 의성이후 심정" },
  { c: "經 1장", h: "心正而后 身修 身修而后 家齊 家齊而后 國治", a: "심정이후 신수 신수이후 제가 제가이후 국치" },
  { c: "經 1장", h: "國治而后 天下平 自天子 以至於庶人 壹是皆以修身爲本", a: "국치이후 천하평 자천자로 이지어서인 일시개이수신위본" },
  { c: "經 1장", h: "其본 亂而末治者 否矣 其所厚者 薄 而其所薄者 厚 未之유也", a: "기본 란이말치자 부의 기소후자 박 이기소박자 후 미지유" },
  { c: "傳 1장", h: "康誥 曰 克明德 太甲 曰 顧諟天之明命", a: "강고 왈 극명덕 태갑 왈 고시천지명명" },
  { c: "傳 1장", h: "帝典 曰 克明峻德 皆自明也", a: "제전 왈 극명준덕 계자명" },
  { c: "傳 2장", h: "湯之盤銘 曰 苟日新 日日新 又日新", a: "탕지반명 왈 구일신 일일신 우일신" },
  { c: "傳 2장", h: "康誥 曰 作新民 詩 曰 周雖舊邦 其命維新", a: "강고 왈 작신민 시 왈 주수구방 기명유신" },
  { c: "傳 3장", h: "詩云 邦畿千里 惟民所止 緡蠻黃鳥 止于丘隅", a: "시운 방기천리 유민소지 시운 민만황조 지우구우" },
  { c: "傳 3장", h: "子 曰 於止 知其所止 可以人而不如鳥乎", a: "자 왈 어지 지기소지 가이인이불여조호" },
  { c: "傳 3장", h: "爲人君 止於仁 爲人臣 止於敬 爲人子 止於孝 爲人父 止於慈", a: "위인군 지어인 위인신 지어경 위인자 지어효 위인부 지어자" },
  { c: "傳 3장", h: "與國人交 止於信 瞻彼淇澳 菉竹猗猗", a: "여국인교 지어신 첨피기욱 록죽여의" },
  { c: "傳 3장", h: "有斐君子 如切如磋 如琢如磨", a: "유비군자 여절여차 여탁여마" },
  { c: "傳 3장", h: "瑟兮僩兮 赫兮喧兮 有斐君子 終不可喧兮", a: "슬혜한혜 혁혜훤혜 유비군자 종불가훤혜" },
  { c: "傳 3장", h: "如切如磋者 道學也 如琢如磨者 自修也", a: "여절여차자 도학야 여탁여마자 자수야" },
  { c: "傳 4장", h: "子 曰 聽訟 吾猶人야 必也使無訟乎", a: "자 왈 청송 오유인야 필야사무송호" },
  { c: "傳 5장", h: "此謂知本 此謂知之至也", a: "차위지본 차위지지지야" },
  { c: "傳 6장", h: "所謂誠其意者 毋自欺也 如惡惡臭 如好好色", a: "소위성기의자 무자기야 여오악취 여호호색" },
  { c: "傳 6장", h: "小人 閒居 爲不善 無所不至 見君子而后 厭然", a: "소인 한거 위불선 무소부지 견군자이후 염연" },
  { c: "傳 6장", h: "曾子 曰 十目所視 十手所指 其嚴乎", a: "증자 왈 십목소시 십수소지 기엄호" },
  { c: "傳 6장", h: "富潤屋 德潤身 心廣體胖 故 君子 必誠其意", a: "부윤옥 덕윤신 심광체반 고 군자 필성기의" },
  { c: "傳 7장", h: "所謂脩身 在正其心者 身有所忿懥 則不得其正", a: "소위수신 재정기심자 신유소분치 즉부득기정" },
  { c: "傳 7장", h: "心不在焉 視而不見 聽而不聞 食而不知其味", a: "심불재언 시이불견 청이불문 식이부지기미" },
  { c: "傳 8장", h: "人 之其所親愛而 辟焉 之其所賤惡而 辟焉", a: "인지기소친애이벽 지기소천오이벽" },
  { c: "傳 8장", h: "故 好而知其惡 惡而知其美자 天下 鮮矣", a: "고로호이지기악 오이지기미자 천하선의" },
  { c: "傳 9장", h: "所謂治國 必先齊其家者 其家 不可敎 而能敎人者 無之", a: "소위치국 필선제기가자 기가 불가교 이능교인자 무지" },
  { c: "傳 9장", h: "一家 仁 一國 興仁 一家 讓 一國 興讓", a: "일가인 일국흥인 일가양 일국흥양" },
  { c: "傳 9장", h: "堯舜 帥天下以仁 而民 從之 桀紂 帥天下以暴 而民 從之", a: "요순 수천하이인 이민종 걸주 수천하이폭 이민종" },
  { c: "傳 9장", h: "君子 有諸己而后 求諸人 無諸己而后 非諸人", a: "군자 유제기이후 구제인 무제기이후 비제인" },
  { c: "傳 9장", h: "宜兄宜弟 宜兄宜弟而后 可以敎國人", a: "의형의제 의형의제이후 가이교국인" },
  { c: "傳 10장", h: "所謂平天下 在治其國者 上 老老而民 興孝", a: "소위평천하 재치기국자 상 노노이민흥효" },
  { c: "傳 10장", h: "上 長長而民 興弟 上 恤孤而民 不倍", a: "상 장장이민흥제 상 휼고이민불배" },
  { c: "傳 10장", h: "是以 君子 有絜矩之道也", a: "시이 군자 유혈구지도야" },
  { c: "傳 10장", h: "道得衆則得國 失衆則失國", a: "도득중 즉득국 실중 즉실국" },
  { c: "傳 10장", h: "德者 本也 財者 末也 外本內末 爭民施奪", a: "덕자본야 재자말야 외본내말 쟁민시탈" },
  { c: "傳 10장", h: "是故 財聚則民散 財散則民聚", a: "시이 재취즉민산 재산즉민취" },
  { c: "傳 10장", h: "生財 有大道 生之者 衆 食之者 寡", a: "생재유대도 생지자중 식지자과" },
  { c: "傳 10장", h: "爲之者 疾 用之者 舒 則財恒足矣", a: "위지자질 용지자서 즉재항족의" },
  { c: "傳 10장", h: "仁者 以財發身 不仁者 以身發財", a: "인자 이재발신 불인자 이신발재" },
  { c: "傳 10장", h: "國 不以利爲利 以義爲利也", a: "국 불이리위리 이의위리" }
];

let currentIndex = 0, timeLeft = 45, currentLimit = 45, currentAcc = 0.6;
let timerInterval = null, isListening = false, wrongStreak = 0;
let totalAttempts = 0, totalCorrect = 0;

const micBtn = document.getElementById('mic-btn'), feedbackBox = document.getElementById('feedback-box');
const hanjaDisplay = document.getElementById('target-hanja'), timerBar = document.getElementById('timer-bar');

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = 'ko-KR'; recognition.interimResults = false;

document.getElementById('total').innerText = quizData.length;

function setDifficulty() {
  const step = Math.floor(currentIndex / 5);
  const diffDisplay = document.getElementById('diff-display');
  if (step === 0) { currentLimit = 45; currentAcc = 0.6; diffDisplay.innerText = "난이도: 입풀기"; diffDisplay.style.background = "#2ecc71"; }
  else if (step === 1) { currentLimit = 40; currentAcc = 0.7; diffDisplay.innerText = "난이도: 집중"; diffDisplay.style.background = "#f1c40f"; }
  else if (step === 2) { currentLimit = 35; currentAcc = 0.75; diffDisplay.innerText = "난이도: 정진"; diffDisplay.style.background = "#e67e22"; }
  else { currentLimit = 30; currentAcc = 0.8; diffDisplay.innerText = "난이도: 심화"; diffDisplay.style.background = "#e74c3c"; }
}

function startTimer() {
  clearInterval(timerInterval); timeLeft = currentLimit;
  timerInterval = setInterval(() => {
    timeLeft--; timerBar.style.width = (timeLeft / currentLimit * 100) + '%';
    if (timeLeft <= 0) { 
      clearInterval(timerInterval); 
      if(isListening) { isListening = false; recognition.stop(); }
      handleResult(false, "⏰ 시간 초과!"); 
    }
  }, 1000);
}

function handleResult(isCorrect, msg) {
  clearInterval(timerInterval);
  feedbackBox.innerText = msg;
  const box = document.getElementById('display-box');
  
  if (isCorrect) {
    totalCorrect++;
    wrongStreak = 0;
    feedbackBox.className = 'correct';
    box.className = 'correct';
    micBtn.disabled = true;
    setTimeout(() => {
      box.className = '';
      micBtn.disabled = false;
      currentIndex++;
      if (currentIndex < quizData.length) updateDisplay();
      else endGame();
    }, 2000);
  } else {
    wrongStreak++;
    feedbackBox.className = 'wrong';
    box.className = 'wrong';
    micBtn.disabled = true;
    if (wrongStreak >= 3) {
      setTimeout(() => {
        feedbackBox.innerText = `3회 오답으로 통과합니다. 정답: [${quizData[currentIndex].a}]`;
        setTimeout(() => {
          wrongStreak = 0;
          box.className = '';
          micBtn.disabled = false;
          currentIndex++;
          if (currentIndex < quizData.length) updateDisplay();
          else endGame();
        }, 3000);
      }, 1000);
    } else {
      setTimeout(() => {
        box.className = '';
        micBtn.disabled = false;
        updateDisplay();
      }, 2000);
    }
  }
}

function updateDisplay() {
  setDifficulty();
  const data = quizData[currentIndex];
  document.getElementById('lvl').innerText = currentIndex + 1;
  document.getElementById('ch-name').innerText = data.c;
  document.getElementById('tag-text').innerText = "大學 " + data.c;
  hanjaDisplay.innerText = data.h;
  feedbackBox.innerText = wrongStreak > 0 
    ? `다시 읽어보세요. (오답 시도: ${wrongStreak}/3)` 
    : "마이크를 누르고 낭독하세요.";
  feedbackBox.className = ''; timerBar.style.width = '100%';
}

function checkAnswer(said, target) {
  const s = said.replace(/[\s\.\,\?\!]/g, "");
  const t = target.replace(/[\s\.\,\?\!]/g, "");
  if (!s || !t) return false;
  const dp = Array.from({length: s.length + 1}, () => new Array(t.length + 1).fill(0));
  for (let i = 1; i <= s.length; i++) {
    for (let j = 1; j <= t.length; j++) {
      dp[i][j] = s[i-1] === t[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  return (dp[s.length][t.length] / t.length) >= currentAcc;
}

micBtn.onclick = () => { if (isListening) return; recognition.start(); micBtn.classList.add('active'); isListening = true; startTimer(); };

recognition.onresult = (event) => {
  totalAttempts++;
  isListening = false; micBtn.classList.remove('active');
  clearInterval(timerInterval);
  const said = event.results[0][0].transcript;
  if (checkAnswer(said, quizData[currentIndex].a)) handleResult(true, "✔️ 正答입니다!");
  else handleResult(false, `❌ 인식: "${said}"`);
};

recognition.onerror = () => { isListening = false; micBtn.classList.remove('active'); clearInterval(timerInterval); handleResult(false, "⚠️ 다시 시도해주세요."); };

recognition.onend = () => {
  if (isListening) {
    isListening = false;
    micBtn.classList.remove('active');
    clearInterval(timerInterval);
  }
};

function endGame() {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  const report = document.getElementById('stat-report');
  const validAttempts = totalAttempts || totalCorrect || 1;
  const accuracy = Math.round((totalCorrect / validAttempts) * 100);
  report.innerHTML = `총 문항 수: ${quizData.length}개<br>정상 인식 시도: ${totalAttempts}회<br>최종 성독 정확도: ${accuracy}%`;
  document.getElementById('result-screen').style.display = 'block';
}

updateDisplay();
</script>
</body>
</html>
